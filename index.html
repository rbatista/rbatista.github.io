<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Raphael Negrisoli</title>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    a { text-decoration: none; }

    html {
      height: 100%;
    }

    body {
      background: #0f0f0f;
      height: 100vh;
      height: 100dvh;
      overflow-y: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Fira Mono", monospace;
    }

    .inner {
      max-width: 560px;
      width: 90%;
      text-align: center;
    }

    h1 {
      font-size: 2.7rem;
      font-weight: 700;
      color: #f0f0f0;
      margin-bottom: 10px;
      letter-spacing: -0.5px;
    }

    p.tagline {
      font-size: 1.2rem;
      color: #888;
      margin-bottom: 54px;
    }

    nav {
      display: flex;
      flex-direction: row;
      gap: 28px;
      justify-content: center;
    }

    nav a {
      color: #aaa;
      font-size: 1.3rem;
      transition: color 0.15s;
    }

    nav a:hover { color: #fff; }

    @media (max-width: 480px) {
      h1 { font-size: 1.9rem; }
      p.tagline { font-size: 1rem; margin-bottom: 40px; }
      nav a { font-size: 1.1rem; }
    }
  </style>
</head>
<body>
  <div class="inner">
    <h1>Raphael Negrisoli</h1>
    <p class="tagline">MSc in Computer Science / Software Engineer</p>
    <nav>
      <a href="https://github.com/rbatista" target="_blank">github</a>
      <a href="https://br.linkedin.com/in/raphaelnegrisoli" target="_blank">linkedin</a>
    </nav>
  </div>
</body>
</html>
